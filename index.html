<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L&D Delay Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: #2a3045;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --success: #3ecf8e;
    --text: #e8ecf4;
    --text-muted: #7a8299;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  .nav {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .nav-brand {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  /* MAIN */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px 60px;
  }

  .hero-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    text-align: center;
  }
  .hero-title {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    text-align: center;
  }
  .hero-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 48px;
    text-align: center;
  }

  /* CARDS */
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 680px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 14px;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 0.18s, background 0.18s, transform 0.12s;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateY(-2px);
  }
  .card:active { transform: translateY(0); }

  .card-scheduled:hover { border-color: var(--accent); }
  .card-unscheduled:hover { border-color: var(--accent2); }
  .card-cerclage:hover { border-color: var(--success); }

  /* subtle top accent stripe */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 14px 14px 0 0;
    opacity: 0;
    transition: opacity 0.18s;
  }
  .card:hover::before { opacity: 1; }
  .card-scheduled::before { background: var(--accent); }
  .card-unscheduled::before { background: var(--accent2); }
  .card-cerclage::before { background: var(--success); }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .card-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .card-arrow {
    margin-top: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 5px;
    transition: color 0.15s, gap 0.15s;
  }
  .card:hover .card-arrow { gap: 8px; }
  .card-scheduled:hover .card-arrow { color: var(--accent); }
  .card-unscheduled:hover .card-arrow { color: var(--accent2); }
  .card-cerclage:hover .card-arrow { color: var(--success); }

  @media (max-width: 480px) {
    .card { padding: 16px 10px; gap: 8px; border-radius: 10px; }
    .card-title { font-size: 11px; }
    .card-arrow { font-size: 10px; }
    .cards { gap: 8px; }
  }

  @media (max-width: 320px) {
    .cards { grid-template-columns: 1fr; }
  }

  .footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: var(--mono);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">L&amp;D DELAY TRACKER</div>
  <a href="report_index.html" style="font-family:var(--mono);font-size:12px;color:var(--text-muted);text-decoration:none;border:1px solid var(--border);padding:6px 12px;border-radius:6px;transition:color 0.15s">Reports →</a>
</nav>

<main class="main">
  <div class="hero-label">OR Delay Reporting</div>
  <div class="hero-title">Log an OR Delay</div>
  <div class="hero-sub">Select the case type to open the correct form</div>

  <div class="cards">
    <a class="card card-scheduled" href="cs_scheduled.html">
      <div class="card-title">Scheduled C-Section</div>
      <div class="card-arrow">Log delay <span>→</span></div>
    </a>

    <a class="card card-unscheduled" href="cs_unscheduled.html">
      <div class="card-title">Unscheduled C-Section</div>
      <div class="card-arrow">Log delay <span>→</span></div>
    </a>

    <a class="card card-cerclage" href="cerclage.html">
      <div class="card-title">Cerclage</div>
      <div class="card-arrow">Log delay <span>→</span></div>
    </a>
  </div>
</main>

<div class="footer">Pomona Valley Hospital Medical Center — L&amp;D Quality Initiative</div>

</body>
</html>
