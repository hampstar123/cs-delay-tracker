<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scheduled C-Section Delay</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117; --surface: #181c27; --surface2: #1e2333; --border: #2a3045;
  --accent: #4f8ef7; --accent2: #7c5cfc; --success: #3ecf8e; --danger: #e85d75;
  --warn: #f5a623; --text: #e8ecf4; --text-muted: #7a8299;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 0 0 48px; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
.header-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.container { max-width: 480px; margin: 0 auto; padding: 20px 16px; }
.section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin-bottom: 14px; }
.field-label { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
select, input[type="time"], input[type="date"], input[type="text"] {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 11px 13px;
  appearance: none; -webkit-appearance: none; outline: none;
}
select:focus, input:focus { border-color: var(--accent); }
.inline-row { display: flex; gap: 10px; }
.inline-row > div { flex: 1; }
.hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
input[type="checkbox"], input[type="radio"] { display: none; }
.cause-label {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 12px 14px; cursor: pointer;
  margin-bottom: 8px; transition: border-color .15s;
}
input[type="checkbox"]:checked + .cause-label {
  border-color: var(--accent); background: rgba(79,142,247,.08);
}
.cause-box {
  width: 20px; height: 20px; min-width: 20px; border: 2px solid var(--border);
  border-radius: 5px; display: flex; align-items: center; justify-content: center; margin-top: 1px;
}
input[type="checkbox"]:checked + .cause-label .cause-box {
  background: var(--accent); border-color: var(--accent);
}
.cause-box svg { display: none; }
input[type="checkbox"]:checked + .cause-label .cause-box svg { display: block; }
.cause-title { font-size: 14px; font-weight: 500; line-height: 1.4; }
.cause-desc { font-size: 12px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }
.toggle-row { display: flex; gap: 10px; margin-top: 4px; }
.doc-label {
  flex: 1; padding: 11px; border-radius: 9px; border: 1.5px solid var(--border);
  background: var(--surface2); color: var(--text-muted);
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; text-align: center; transition: all .15s;
}
input[type="radio"]#doc-yes:checked + .doc-label {
  border-color: var(--success); background: rgba(62,207,142,.1); color: var(--success);
}
input[type="radio"]#doc-no:checked + .doc-label {
  border-color: var(--danger); background: rgba(232,93,117,.1); color: var(--danger);
}
textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 11px 13px; resize: vertical; min-height: 72px; outline: none; }
textarea:focus { border-color: var(--accent); }
.save-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--success), var(--accent)); color: #fff; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 6px; display: block; }
</style>

<script>
var FORM_ID = 'xHuKPzfjpUeg_A1RLA4F8f3VOhdfNUBLoZtQYKtN8olURjFNSFZENTg1NUo5M1gxNkhJNTc0NlE2SCQlQCN0PWcu';
var FORM_BASE = 'https://forms.office.com/Pages/ResponsePage.aspx?id=' + FORM_ID;
var FIELDS = {
  mrn:           'r989f116497074852ad9a16ec3aa3108f',
  location:      'r29090a898fb949579aa93419ea8732f0',
  date:          'r784660b609e84787a389358e05d77694',
  scheduledTime: 'rb2eed5743edb44bc9afba68a7096a77a',
  timeoutTime:   'rdb6cfd518bab44fb89d01672d8ebc71f',
  cause:         'r76bbd9f8a1d54cf594bb6d50214a8190',
  comment:       'raa02ecadc31641bab4e3684acd43280f',
  documentation: 'r2d20e9e4e075465ea222c535614f9800'
};

function handleSubmit() {
  var mrn          = document.getElementById('mrn').value;
  var location     = document.getElementById('location').value;
  var date         = document.getElementById('date').value;
  var scheduledTime= document.getElementById('scheduled-time').value;
  var timeoutTime  = document.getElementById('timeout-time').value;
  var docEl        = document.querySelector('input[name="documentation"]:checked');
  var docValue     = docEl ? docEl.value : '';
  var comment      = document.getElementById('comment').value || '';

  var causeEls = document.querySelectorAll('input[name="cause"]:checked');
  var causes = [];
  for (var i = 0; i < causeEls.length; i++) causes.push(causeEls[i].value);

  if (!mrn || !location || !date || !scheduledTime || !timeoutTime || causes.length === 0 || !docValue) {
    alert('Please complete all required fields and select at least one cause.');
    return false;
  }

  var url = FORM_BASE;
  url += '&' + FIELDS.mrn           + '=' + encodeURIComponent(mrn);
  url += '&' + FIELDS.location      + '=' + encodeURIComponent(location);
  url += '&' + FIELDS.date          + '=' + encodeURIComponent(date);
  url += '&' + FIELDS.scheduledTime + '=' + encodeURIComponent(scheduledTime);
  url += '&' + FIELDS.timeoutTime   + '=' + encodeURIComponent(timeoutTime);
  url += '&' + FIELDS.cause         + '=' + encodeURIComponent(causes.join(', '));
  url += '&' + FIELDS.comment       + '=' + encodeURIComponent(comment);
  url += '&' + FIELDS.documentation + '=' + encodeURIComponent(docValue);

  window.open(url, '_blank');
  return false;
}

function setToday() {
  try {
    var d = new Date();
    var pad = function(n) { return n < 10 ? '0' + n : String(n); };
    document.getElementById('date').value = d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
  } catch(e) {}
}
</script>
</head>
<body onload="setToday()">

<div class="header">
  <div class="header-icon">📋</div>
  <div>
    <div style="font-size:17px;font-weight:600;">Scheduled Delay Report</div>
    <div style="font-size:12px;color:var(--text-muted);">Scheduled C-section OR delays</div>
  </div>
</div>

<div class="container">
  <form id="delay-form" onsubmit="return handleSubmit()">

    <div class="section">
      <div class="section-label">Case Details</div>
      <div style="margin-bottom:12px;">
        <div class="field-label">MRN</div>
        <input type="text" id="mrn" name="mrn" placeholder="Enter MRN…">
      </div>
      <div class="inline-row" style="margin-bottom:12px;">
        <div>
          <div class="field-label">Location</div>
          <select id="location" name="location">
            <option value="">Select…</option>
            <option value="FMC L&D">FMC L&D</option>
            <option value="OMC L&D">OMC L&D</option>
          </select>
        </div>
        <div>
          <div class="field-label">Date</div>
          <input type="date" id="date" name="date">
        </div>
      </div>
      <div class="inline-row">
        <div>
          <div class="field-label">Scheduled Start Time</div>
          <input type="time" id="scheduled-time" name="scheduledTime">
          <div class="hint">FMC: 7:30, 9:30, 11:00, 1:00<br>OMC: 7:30, 11:00, 1:00</div>
        </div>
        <div>
          <div class="field-label">1st Time-Out</div>
          <input type="time" id="timeout-time" name="timeoutTime">
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Cause of Delay</div>

      <input type="checkbox" id="c1" name="cause" value="Anesthesia Bump">
      <label class="cause-label" for="c1">
        <div class="cause-box"><svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="cause-title">Anesthesia Bump</div>
      </label>

      <input type="checkbox" id="c2" name="cause" value="Nursing Bump">
      <label class="cause-label" for="c2">
        <div class="cause-box"><svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="cause-title">Nursing Bump</div>
      </label>

      <input type="checkbox" id="c3" name="cause" value="Unwarranted Delay by Anesthesia">
      <label class="cause-label" for="c3">
        <div class="cause-box"><svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="cause-title">Unwarranted Delay by Anesthesia</div>
      </label>

      <input type="checkbox" id="c4" name="cause" value="Unwarranted Delay by Nursing">
      <label class="cause-label" for="c4">
        <div class="cause-box"><svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="cause-title">Unwarranted Delay by Nursing</div>
      </label>

      <input type="checkbox" id="c5" name="cause" value="MD Hold">
      <label class="cause-label" for="c5">
        <div class="cause-box"><svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div>
          <div class="cause-title">MD Hold</div>
          <div class="cause-desc">C-sections held by OB team due to higher-priority unscheduled cases / two ORs in use or being held.</div>
        </div>
      </label>

      <input type="checkbox" id="c6" name="cause" value="EVS Delay">
      <label class="cause-label" for="c6">
        <div class="cause-box"><svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="cause-title">EVS Delay</div>
      </label>

      <input type="checkbox" id="c7" name="cause" value="Mandatory Nursing Break">
      <label class="cause-label" for="c7">
        <div class="cause-box"><svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="cause-title">Mandatory Nursing Break</div>
      </label>

      <div style="margin-top:14px;">
        <div class="field-label">Comment</div>
        <textarea id="comment" name="comment" placeholder="Optional additional details…"></textarea>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Documentation</div>
      <div class="field-label">Has the H&amp;P been completed?</div>
      <div class="toggle-row">
        <input type="radio" id="doc-yes" name="documentation" value="yes">
        <label class="doc-label" for="doc-yes">Yes</label>
        <input type="radio" id="doc-no" name="documentation" value="no">
        <label class="doc-label" for="doc-no">No</label>
      </div>
    </div>

    <button type="submit" class="save-btn">🔒 Ready to Save to KP</button>
  </form>
</div>

</body>
</html>
